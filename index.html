<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GhostChat // Secure Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="nameModal" class="modal">
    <div class="modal-content animate-fade-in">
        <div class="modal-brand">
            <div class="brand-glow"></div>
            <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 21l8.944-8.944M18 10V4a2 2 0 00-2-2H4a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2v-3.333M21 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </div>
        <h2>Initialize Node Signature</h2>
        <p>Establish a verified unique identity signature and choose an active cluster accent color.</p>
        
        <div class="input-group">
            <input type="text" id="usernameInput" placeholder="Enter custom identity handle..." autocomplete="off" required spellcheck="false">
            <span class="input-focus-line"></span>
            <div id="usernameFeedback" class="feedback-msg"></div>
        </div>
        
        <div class="color-picker-section">
            <div class="color-picker-label">Accent Signature Matrix</div>
            <div class="avatar-color-picker">
                <div class="color-dot selected" data-color="#00d2d3" style="background: #00d2d3;"></div>
                <div class="color-dot" data-color="#ff9f43" style="background: #ff9f43;"></div>
                <div class="color-dot" data-color="#ff6b6b" style="background: #ff6b6b;"></div>
                <div class="color-dot" data-color="#1dd1a1" style="background: #1dd1a1;"></div>
                <div class="color-dot" data-color="#a55eea" style="background: #a55eea;"></div>
            </div>
        </div>

        <button id="saveNameBtn" class="primary-glow-btn">Authenticate & Access</button>
    </div>
</div>

<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-wrapper">
                <div class="pulse-ring"></div>
                <h3>⚡ CORE WORKSPACE</h3>
            </div>
        </div>
        
        <div class="sidebar-info">
            <div class="user-card">
                <div class="user-card-meta">
                    <div class="avatar-skeleton micro"></div>
                    <span id="currentUserDisplay">Connecting Terminal...</span>
                </div>
                <span class="status-dot online-pulse"></span>
            </div>
            
            <div class="active-users-panel">
                <div class="panel-header">
                    <h4>Active Terminals</h4>
                    <span class="live-badge">Live</span>
                </div>
                <div id="onlineUsersList" class="custom-scrollbar">
                    <div class="user-item-skeleton">
                        <div class="avatar-skeleton"></div>
                        <div class="line-skeleton"></div>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <main class="chat-container" id="chatContainer">
        <header class="chat-header">
            <div class="header-details">
                <div class="title-row">
                    <svg class="header-status-icon" viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="12" cy="12" r="8"/>
                    </svg>
                    <h1>Secure Mainframe Channel</h1>
                </div>
                <p id="mobileUserDisplay">Active Session Node</p>
            </div>
            
            <div class="header-actions">
                <button id="decFontBtn" class="secondary-btn icon-btn" title="Decrease Structural Font Scaling">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/></svg>
                </button>
                <button id="incFontBtn" class="secondary-btn icon-btn" title="Increase Structural Font Scaling">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
                </button>
                
                <div class="action-divider"></div>
                
                <button id="changeNameBtn" class="secondary-btn" title="Reconfigure Node Identity Profile">
                    <svg class="btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    <span>Identity</span>
                </button>
                
                <button id="themeBtn" class="secondary-btn" title="Cycle Core Environment Array Matrix">
                    <svg class="btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
                    </svg>
                    <span>Palette</span>
                </button>
                
                <button id="clearChatBtn" class="danger-btn" title="Purge Shared History Log Buffers">
                    <svg class="btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    <span>Purge Logs</span>
                </button>
            </div>
        </header>

        <div id="chatHistory" class="custom-scrollbar">
            <div class="skeleton-wrapper">
                <div class="bubble-skeleton incoming"></div>
                <div class="bubble-skeleton outgoing"></div>
            </div>
        </div>

        <div id="typingIndicator" class="typing-banner hidden"></div>

        <footer class="input-area">
            <div id="imagePreviewContainer" class="hidden">
                <div class="preview-wrapper">
                    <img id="imagePreview" src="" alt="Staged Asset Attachment Matrix">
                    <span id="cancelImage" title="Drop File Attachments">✕</span>
                </div>
            </div>
            
            <div class="action-bar-container">
                <div class="action-bar">
                    <label for="cameraInput" class="file-label" title="Capture Direct Environmental Imaging">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </label>
                    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">

                    <label for="imageInput" class="file-label" title="Reference Native System Storage Drive">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </label>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;">
                    
                    <input type="text" id="message" placeholder="Transmit data packet or interact with @ai..." autocomplete="off" spellcheck="true">
                    
                    <button id="sendBtn" class="interactive-send-btn" title="Broadcast Data Signature Packet">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </button>
                </div>
            </div>
        </footer>
    </main>
</div>

<div id="zoomModal" class="zoom-modal hidden">
    <span id="closeZoom" class="close-zoom" title="Dismiss Immersive Overlay Layer">✕</span>
    
    <div class="swipe-container" id="swipeContainer">
        </div>

    <div class="viewer-navigation-info">
        <span id="viewerIndexDisplay">0 / 0</span>
    </div>

    <div class="zoom-controls">
        <button id="zoomOutBtn" class="control-btn-blur">✕ Zoom Out</button>
        <button id="zoomInBtn" class="control-btn-blur">➕ Zoom In</button>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
