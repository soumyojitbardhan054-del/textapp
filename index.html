<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="nameModal" class="modal">
    <div class="modal-content">
        <h2>Enter Your Name</h2>
        <input type="text" id="usernameInput" placeholder="e.g., brine or jia">
        <button id="saveNameBtn">Start Chatting</button>
    </div>
</div>

<div class="container">
    <div class="chat-header">
        <div class="header-info">
            <span class="status-dot"></span>
            <h1>💬 Chat Room</h1>
        </div>
        <button id="clearChatBtn" class="danger-btn">Clear Chat</button>
    </div>

    <div id="chatHistory"></div>

    <div class="input-area">
        <div id="imagePreviewContainer" class="hidden">
            <span id="cancelImage">✕</span>
            <img id="imagePreview" src="" alt="Preview">
        </div>
        <div class="text-and-file">
            <label for="imageInput" class="file-label">🖼️</label>
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
            <textarea id="message" placeholder="Type your message here..."></textarea>
            <button id="sendBtn">Send</button>
        </div>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
