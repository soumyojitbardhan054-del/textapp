<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GhostChat Terminal</title>
  
  <link rel="stylesheet" href="style.css">
  
  <style id="dynamic-font-style"></style>
</head>
<body>

  <div class="app-layout">
    
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-wrapper">
          <div class="pulse-ring"></div>
          <svg class="btn-svg" style="color: var(--accent); width: 18px; height: 18px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          <h3>GHOSTCHAT</h3>
        </div>
      </div>
      
      <div class="sidebar-info custom-scrollbar">
        <div class="user-card">
          <div class="user-card-meta">
            <div class="status-dot online-pulse"></div>
            <span id="currentUserDisplay">Connecting...</span>
          </div>
          <button class="secondary-btn" id="changeNameBtn" style="padding: 4px 8px; font-size: 11px;" title="Edit Profile">
            <svg class="btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"></path>
            </svg>
            <span>Edit</span>
          </button>
        </div>

        <div class="active-users-panel">
          <div class="panel-header" title="Toggle Active Users">
            <h4>Active Terminals</h4>
            <span class="live-badge">Live</span>
          </div>
          <div id="onlineUsersList" class="custom-scrollbar">
            </div>
        </div>
      </div>
    </aside>

    <main class="chat-container" id="chatContainer">
      <header class="chat-header">
        <div class="header-details">
          <div class="title-row">
            <svg class="header-status-icon" viewBox="0 0 24 24" fill="currentColor">
              <circle cx="12" cy="12" r="10"></circle>
            </svg>
            <h1>Secure Communications Channel</h1>
          </div>
          <div id="mobileUserDisplay">Syncing identity node...</div>
        </div>

        <div class="header-actions">
          <button class="secondary-btn icon-btn" id="decFontBtn" title="Decrease Font">
            <svg class="btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
          
          <button class="secondary-btn icon-btn" id="incFontBtn" title="Increase Font">
            <svg class="btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>

          <div class="action-divider"></div>

          <button class="secondary-btn icon-btn" id="themeBtn" title="Toggle UI Palette Matrix">
            <svg class="btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 21a9 9 0 0 1 0-18v18z"></path>
            </svg>
          </button>

          <button class="danger-btn icon-btn" id="clearChatBtn" title="Purge System Communication Buffers">
            <svg class="btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
          </button>
        </div>
      </header>

      <section id="chatHistory" class="custom-scrollbar">
        <div class="skeleton-wrapper">
          <div class="user-item-skeleton">
            <div class="avatar-skeleton micro"></div>
            <div class="line-skeleton"></div>
          </div>
          <div class="bubble-skeleton incoming"></div>
          <div class="bubble-skeleton outgoing"></div>
        </div>
      </section>

      <div id="typingIndicator" class="typing-banner hidden"></div>

      <footer class="input-area">
        
        <div id="imagePreviewContainer" class="hidden">
          <div class="preview-wrapper">
            <img id="imagePreview" src="" alt="Packet Media Asset">
            <div id="cancelImage" title="Revoke Media Asset">&times;</div>
          </div>
        </div>

        <div class="action-bar-container">
          <div class="action-bar">
            
            <label for="imageInput" class="file-label" title="Reference Local Image File">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
              </svg>
            </label>
            <input type="file" id="imageInput" accept="image/*" style="display: none;">

            <label for="cameraInput" class="file-label" title="Access Hardware Lens Stream">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
              </svg>
            </label>
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">

            <input type="text" id="message" placeholder="Secure payload string (use @ai for AI Agent)..." autocomplete="off">

            <button class="interactive-send-btn" id="sendBtn" title="Transmit Packet Node">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>

          </div>
        </div>
      </footer>
    </main>
  </div>

  <div id="nameModal" class="modal">
    <div class="modal-content">
      <div class="modal-brand">
        <div class="brand-glow"></div>
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h2>Identity Terminal Node Activation</h2>
      <p>Configure your terminal signature address and encryption index node to participate in active communications.</p>
      
      <div class="input-group">
        <input type="text" id="usernameInput" placeholder="Enter Terminal Username Signature..." maxlength="20" autocomplete="off">
        <div id="usernameFeedback" class="feedback-msg"></div>
      </div>

      <div class="color-picker-section">
        <div class="color-picker-label">Identity Color Signature</div>
        <div class="avatar-color-picker">
          <div class="color-dot selected" data-color="#00d2d3" style="background: #00d2d3;"></div>
          <div class="color-dot" data-color="#ff4757" style="background: #ff4757;"></div>
          <div class="color-dot" data-color="#1dd1a1" style="background: #1dd1a1;"></div>
          <div class="color-dot" data-color="#ff9f43" style="background: #ff9f43;"></div>
          <div class="color-dot" data-color="#a29bfe" style="background: #a29bfe;"></div>
          <div class="color-dot" data-color="#ff007f" style="background: #ff007f;"></div>
        </div>
      </div>

      <button class="primary-glow-btn" id="saveNameBtn">Initialize Encryption Key</button>
    </div>
  </div>

  <div id="zoomModal" class="zoom-modal hidden">
    <div class="viewer-navigation-info" id="viewerIndexDisplay">1 / 1</div>
    <div class="close-zoom" id="closeZoom" title="Collapse Viewer">&times;</div>
    
    <div class="swipe-container" id="swipeContainer">
      </div>
    
    <div class="zoom-controls">
      <button class="control-btn-blur" id="zoomOutBtn">Zoom Out -</button>
      <button class="control-btn-blur" id="zoomInBtn">Zoom In +</button>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
