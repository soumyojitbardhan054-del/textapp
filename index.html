<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Chat Room</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="nameModal" class="modal">
    <div class="modal-content">
        <h2>Setup Identity</h2>
        <p>Please enter your name and choose a profile color.</p>
        <input type="text" id="usernameInput" placeholder="e.g., brine or jia">
        
        <div class="color-picker-label">Pick Profile Accent:</div>
        <div class="avatar-color-picker">
            <div class="color-dot selected" data-color="#00d2d3" style="background: #00d2d3;"></div>
            <div class="color-dot" data-color="#ff9f43" style="background: #ff9f43;"></div>
            <div class="color-dot" data-color="#ff6b6b" style="background: #ff6b6b;"></div>
            <div class="color-dot" data-color="#1dd1a1" style="background: #1dd1a1;"></div>
            <div class="color-dot" data-color="#a55eea" style="background: #a55eea;"></div>
        </div>

        <button id="saveNameBtn">Enter Chatroom</button>
    </div>
</div>

<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h3>⚡ Workspace</h3>
        </div>
        <div class="sidebar-info">
            <div class="user-card">
                <span id="currentUserDisplay">Connecting...</span>
                <span class="status-dot"></span>
            </div>
            <div class="active-users-panel">
                <h4>Online Users</h4>
                <div id="onlineUsersList"></div>
            </div>
            <p class="sidebar-tip">Type <strong>@ai</strong> followed by your question to chat with the built-in AI bot!</p>
        </div>
    </aside>

    <main class="chat-container" id="chatContainer">
        <header class="chat-header">
            <div class="header-details">
                <h1>💬 Chat Room</h1>
                <p id="mobileUserDisplay">Active Session</p>
            </div>
            <div class="header-actions">
                <button id="changeNameBtn" class="secondary-btn">👤 Profile</button>
                <button id="themeBtn" class="secondary-btn">🎨 Theme</button>
                <button id="clearChatBtn" class="danger-btn">Clear All</button>
            </div>
        </header>

        <div id="chatHistory"></div>

        <div id="typingIndicator" class="typing-banner hidden"></div>

        <footer class="input-area">
            <div id="imagePreviewContainer" class="hidden">
                <img id="imagePreview" src="" alt="Preview">
                <span id="cancelImage">✕</span>
            </div>
            
            <div class="action-bar">
                <label for="imageInput" class="file-label" title="Attach an Image">
                    🖼️
                </label>
                <input
    type="file"
    id="imageInput"
    accept="image/*"
    capture
    style="display:none;">
                
                <input type="text" id="message" placeholder="Type a message or @ai..." autocomplete="off">
                
                <button id="sendBtn">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </footer>
    </main>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
